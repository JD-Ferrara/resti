name: "Step 1: Places Pipeline — Discover + Filter"
# Fetches place data for the selected area(s), applies local filters
# (geofence, rating, chain exclusion), and upserts qualifying rows to
# raw_places with status=pending.
#
# Check one or more area boxes below — any combination is valid.
# Check "All areas" to run every district in one shot.

on:
  workflow_dispatch:
    inputs:

      # ── Select all ──────────────────────────────────────
      all_areas:
        description: '[ All areas ]'
        type: boolean
        default: false

      # ── Individual areas ─────────────────────────────────
      hudson_yards:
        description: 'Hudson Yards'
        type: boolean
        default: false
      chelsea:
        description: 'Chelsea'
        type: boolean
        default: false
      meatpacking:
        description: 'Meatpacking District'
        type: boolean
        default: false
      west_village:
        description: 'West Village'
        type: boolean
        default: false
      greenwich_village:
        description: 'Greenwich Village'
        type: boolean
        default: false
      hudson_square:
        description: 'Hudson Square'
        type: boolean
        default: false
      soho:
        description: 'SoHo'
        type: boolean
        default: false
      noho:
        description: 'NoHo'
        type: boolean
        default: false
      tribeca:
        description: 'Tribeca'
        type: boolean
        default: false
      financial_district:
        description: 'Financial District'
        type: boolean
        default: false
      little_italy:
        description: 'Little Italy'
        type: boolean
        default: false
      chinatown:
        description: 'Chinatown'
        type: boolean
        default: false
      nolita:
        description: 'NoLita'
        type: boolean
        default: false
      lower_east_side:
        description: 'Lower East Side'
        type: boolean
        default: false
      union_square:
        description: 'Union Square'
        type: boolean
        default: false
      gramercy:
        description: 'Gramercy'
        type: boolean
        default: false
      flatiron:
        description: 'Flatiron'
        type: boolean
        default: false
      nomad:
        description: 'NoMad'
        type: boolean
        default: false
      east_village:
        description: 'East Village'
        type: boolean
        default: false

      # ── Options ───────────────────────────────────────────
      skip_editorial:
        description: 'Skip editorial summary enrichment (faster, no Preferred-tier billing)'
        type: boolean
        default: false

jobs:
  run-pipeline:
    name: "Step 1: Discover → Filter → Seed pending"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env

      - name: Resolve selected areas
        id: areas
        run: |
          if [ "${{ github.event.inputs.all_areas }}" = "true" ]; then
            echo "list=all" >> $GITHUB_OUTPUT
            exit 0
          fi

          AREAS=""
          [ "${{ github.event.inputs.hudson_yards }}"       = "true" ] && AREAS="$AREAS,hudson_yards"
          [ "${{ github.event.inputs.chelsea }}"            = "true" ] && AREAS="$AREAS,chelsea"
          [ "${{ github.event.inputs.meatpacking }}"        = "true" ] && AREAS="$AREAS,meatpacking"
          [ "${{ github.event.inputs.west_village }}"       = "true" ] && AREAS="$AREAS,west_village"
          [ "${{ github.event.inputs.greenwich_village }}"  = "true" ] && AREAS="$AREAS,greenwich_village"
          [ "${{ github.event.inputs.hudson_square }}"      = "true" ] && AREAS="$AREAS,hudson_square"
          [ "${{ github.event.inputs.soho }}"               = "true" ] && AREAS="$AREAS,soho"
          [ "${{ github.event.inputs.noho }}"               = "true" ] && AREAS="$AREAS,noho"
          [ "${{ github.event.inputs.tribeca }}"            = "true" ] && AREAS="$AREAS,tribeca"
          [ "${{ github.event.inputs.financial_district }}" = "true" ] && AREAS="$AREAS,financial_district"
          [ "${{ github.event.inputs.little_italy }}"       = "true" ] && AREAS="$AREAS,little_italy"
          [ "${{ github.event.inputs.chinatown }}"          = "true" ] && AREAS="$AREAS,chinatown"
          [ "${{ github.event.inputs.nolita }}"             = "true" ] && AREAS="$AREAS,nolita"
          [ "${{ github.event.inputs.lower_east_side }}"    = "true" ] && AREAS="$AREAS,lower_east_side"
          [ "${{ github.event.inputs.union_square }}"       = "true" ] && AREAS="$AREAS,union_square"
          [ "${{ github.event.inputs.gramercy }}"           = "true" ] && AREAS="$AREAS,gramercy"
          [ "${{ github.event.inputs.flatiron }}"           = "true" ] && AREAS="$AREAS,flatiron"
          [ "${{ github.event.inputs.nomad }}"              = "true" ] && AREAS="$AREAS,nomad"
          [ "${{ github.event.inputs.east_village }}"       = "true" ] && AREAS="$AREAS,east_village"

          # Strip leading comma
          AREAS="${AREAS#,}"

          if [ -z "$AREAS" ]; then
            echo "❌ No areas selected — check at least one box before running." >&2
            exit 1
          fi

          echo "list=$AREAS" >> $GITHUB_OUTPUT

      - name: "Step 1 — Discover + filter (seed-raw-places.js)"
        run: |
          ARGS="--area ${{ steps.areas.outputs.list }}"
          if [ "${{ github.event.inputs.skip_editorial }}" = "true" ]; then
            ARGS="$ARGS --skip-editorial"
          fi
          node scripts/seed-raw-places.js $ARGS

      - name: Run comparison (Hudson Yards only)
        if: contains(steps.areas.outputs.list, 'hudson_yards')
        run: node scripts/compare-hudson-yards.js --save

      - name: Upload comparison report
        if: contains(steps.areas.outputs.list, 'hudson_yards')
        uses: actions/upload-artifact@v4
        with:
          name: hudson-yards-compare-${{ github.run_number }}
          path: scripts/output/hudson-yards-compare.json
          retention-days: 30
