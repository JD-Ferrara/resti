name: "Step 1: Places Pipeline — Discover + Filter"
# Fetches minimal place data (id, name, location, rating, review count, types)
# for the selected area(s), applies local filters (geofence, rating, chain
# exclusion), and upserts only qualifying rows to raw_places with status=pending.
#
# Run Step 2 (enrich-raw-places.yml) after reviewing the pending results to
# populate the full atmosphere + contact fields via Place Details (New) API.

on:
  workflow_dispatch:
    inputs:
      area:
        description: 'Area(s) to fetch — single key, comma-separated, or "all"'
        required: true
        default: 'hudson_yards'
        type: choice
        options:
          - hudson_yards
          - chelsea
          - meatpacking
          - west_village
          - greenwich_village
          - hudson_square
          - soho
          - noho
          - tribeca
          - financial_district
          - little_italy
          - chinatown
          - nolita
          - lower_east_side
          - union_square
          - gramercy
          - flatiron
          - nomad
          - east_village
          - all

jobs:
  run-pipeline:
    name: "Step 1: Discover → Filter → Seed pending"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env

      - name: "Step 1 — Discover + filter (seed-raw-places.js)"
        run: node scripts/seed-raw-places.js --area ${{ github.event.inputs.area }}

      - name: Run comparison (Hudson Yards only)
        if: github.event.inputs.area == 'hudson_yards'
        run: node scripts/compare-hudson-yards.js --save

      - name: Upload comparison report
        if: github.event.inputs.area == 'hudson_yards'
        uses: actions/upload-artifact@v4
        with:
          name: hudson-yards-compare-${{ github.run_number }}
          path: scripts/output/hudson-yards-compare.json
          retention-days: 30
