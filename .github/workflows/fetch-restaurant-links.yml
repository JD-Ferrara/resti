name: "Step 4: Links Pipeline — Fetch Website / Instagram / Reservation"
# Populates website, instagram, reservation, reservation_platform, and
# reservation_confidence columns on the restaurants table.
#
# Modes:
#   incremental   — skips fields already set and restaurants fetched in last 30 days
#   force         — re-fetches all; preserves existing values where nothing new is found
#   skip-validate — trust all existing values; only fill nulls
#   playwright    — same as incremental, but also runs Playwright for reservation
#                   discovery on restaurants where static scraping finds nothing.
#                   Installs Chromium (~500MB, cached between runs). Adds 5–15 min.
#
# Single field / single restaurant: use the optional inputs below.
#
# Schema prerequisite:
#   Run supabase-add-reservation-meta.sql in Supabase SQL Editor first to add
#   reservation_platform and reservation_confidence columns.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - force
          - skip-validate
          - playwright
      field:
        description: 'Optional: single field to update (leave blank for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - website
          - instagram
          - reservation
      restaurant_id:
        description: 'Optional: single restaurant id (leave blank for all)'
        required: false
        default: ''

jobs:
  fetch-links:
    name: "Fetch restaurant website / instagram / reservation links"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Cache Chromium between runs to avoid re-downloading ~500MB each time.
      # Only runs in playwright mode; other modes skip the Playwright install step.
      - name: Cache Playwright browsers
        if: ${{ github.event.inputs.mode == 'playwright' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: ${{ github.event.inputs.mode == 'playwright' }}
        run: npx playwright install chromium --with-deps

      - name: Write .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env
          echo "TAVILY_API_KEY=$TAVILY_API_KEY" >> .env
          echo "GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY" >> .env
          if [ "${{ github.event.inputs.mode }}" = "playwright" ]; then
            echo "USE_PLAYWRIGHT=true" >> .env
          fi

      - name: Build script flags
        id: flags
        run: |
          FLAGS=""
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "force" ]; then
            FLAGS="$FLAGS --force"
          elif [ "$MODE" = "skip-validate" ]; then
            FLAGS="$FLAGS --skip-validate"
          fi
          # playwright mode runs as incremental but with USE_PLAYWRIGHT=true in .env
          if [ -n "${{ github.event.inputs.field }}" ]; then
            FLAGS="$FLAGS --field=${{ github.event.inputs.field }}"
          fi
          if [ -n "${{ github.event.inputs.restaurant_id }}" ]; then
            FLAGS="$FLAGS --id=${{ github.event.inputs.restaurant_id }}"
          fi
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: "Fetch restaurant links"
        run: node scripts/fetch-restaurant-links.js ${{ steps.flags.outputs.flags }}
