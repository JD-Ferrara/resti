name: "Places Pipeline — Step 3: Enrich approved"
# For each Claude-approved candidate in filtered_places (source_status = ai_candidate),
# calls Place Details (New) to populate atmosphere + contact fields in raw_places:
#   phone, website, hours, outdoor seating, reservations, serves_*,
#   takeout, delivery, dineIn, photos.
#
# Run ORDER: Step 1 (places-pipeline.yml) → Step 2 (filtered-places-pipeline.yml) → this.
#
# Why AFTER Claude, not before: Claude's classifier only uses name, address,
# google_types, editorial_summary, price_level, and rating — all fetched in
# Step 1. Enriching atmosphere fields before Claude would waste Place Details
# calls on places Claude will exclude (~70-80% of candidates).

on:
  workflow_dispatch:
    inputs:
      area:
        description: 'Area(s) to enrich — single key, comma-separated, or "all"'
        required: true
        default: 'hudson_yards'
        type: choice
        options:
          - hudson_yards
          - chelsea
          - meatpacking
          - west_village
          - greenwich_village
          - hudson_square
          - soho
          - noho
          - tribeca
          - financial_district
          - little_italy
          - chinatown
          - nolita
          - lower_east_side
          - union_square
          - gramercy
          - flatiron
          - nomad
          - east_village
          - all

jobs:
  enrich:
    name: "Step 3: Enrich approved → Place Details"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env

      - name: "Step 3 — Enrich approved candidates (enrich-raw-places.js)"
        run: node scripts/enrich-raw-places.js --area ${{ github.event.inputs.area }}
