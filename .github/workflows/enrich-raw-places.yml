name: "Places Pipeline — Step 2: Enrich pending"
# For each raw_places row with status=pending in the selected area(s), calls the
# Place Details (New) API to populate the full atmosphere + contact fields:
#   price level, phone, website, hours, outdoor seating, reservations, serves_*,
#   takeout, delivery, editorial summary, photos.
#
# Run this after Step 1 (places-pipeline.yml) and after reviewing the pending list.
# Only pending rows are touched — already-enriched or excluded rows are not affected.

on:
  workflow_dispatch:
    inputs:
      area:
        description: 'Area(s) to enrich — single key, comma-separated, or "all"'
        required: true
        default: 'hudson_yards'
        type: choice
        options:
          - hudson_yards
          - chelsea
          - meatpacking
          - west_village
          - greenwich_village
          - hudson_square
          - soho
          - noho
          - tribeca
          - financial_district
          - little_italy
          - chinatown
          - nolita
          - lower_east_side
          - union_square
          - gramercy
          - flatiron
          - nomad
          - east_village
          - all

jobs:
  enrich:
    name: "Step 2: Enrich pending → Place Details"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env

      - name: "Step 2 — Enrich pending rows (enrich-raw-places.js)"
        run: node scripts/enrich-raw-places.js --area ${{ github.event.inputs.area }}
